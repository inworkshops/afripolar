<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none" role="img" aria-label="Playbook Tool">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="18" cy="18" r="18" fill="url(#orangeGrad)"/>

  <!-- P letter (left side) -->
  <g>
    <!-- P stem -->
    <rect x="8" y="10" width="3" height="16" rx="1.5" fill="white"/>
    <!-- P bowl -->
    <path d="M 11 10 Q 16 10 16 14.5 Q 16 19 11 19 L 11 10" fill="white" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- R letter (rotated and attached) - rotated 35 degrees -->
  <g transform="translate(20, 16) rotate(-35)">
    <!-- R stem -->
    <rect x="0" y="-6" width="2.5" height="13" rx="1.2" fill="white"/>
    <!-- R bowl -->
    <path d="M 2.5 -6 Q 6.5 -6 6.5 -2.5 Q 6.5 1 2.5 1 L 2.5 -6" fill="white" stroke="white" stroke-width="0.4"/>
    <!-- R leg -->
    <line x1="3.5" y1="1" x2="7" y2="7" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>